<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<html xmlns:sec="https://www.thymeleaf.org/thymeleaf-extras-springsecurity3">
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/external/all.min.css">
    <link rel="stylesheet" href="css/style.css">


    <title>Login</title>
</head>
<body>


    <!-- ======================================================
                Sign Up Page
    ========================================================-->
    <section class="sign-section">
        <div class="container">
            <div class="row">
                <div class="image-content">
                    <div class="recipe-box">
                        <div class="img-box">
                            <img src="img/recipes/8.jpeg" alt="">
                        </div>
                        <div class="text-box">
                            <p>Name: <span>hot chicken</span></p>
                            <p>Price: <span>100.00$</span></p>
                            <p>Gategory: <span>fast food</span></p>
                        </div>
                    </div>

                    <div class="recipe-box">
                        <div class="img-box">
                            <img src="img/recipes/9.jpeg" alt="">
                        </div>
                        <div class="text-box">
                            <p>Name: <span>rice</span></p>
                            <p>Price: <span>200.00$</span></p>
                            <p>Gategory: <span>food</span></p>
                        </div>
                    </div>

                    <div>
                        <a href="/"><i class="fa fa-arrow-left"></i></a>
                    </div>
                </div>

                <div class="sign-content">
                    <div class="form">
                        <div class="form-start">
                            <h1>Online kitchen</h1>
                            <span>Login</span>
                        </div>
                    <form th:action="@{/login}" method="post">

                        <div class="form-content">
                            <input name = "email" type="text" placeholder="Email..">
                        </div>

                        <div class="form-content">
                            <input name="password" type="password" placeholder="Password..">
                        </div>

                        <div th:if="${param.error}" class="form-content">
                            <p class="error">Email or Password invalid, please verify</p>
                        </div>

                        <div class="form-content">                        
                            <button type="submit" class="btn">Login</button><br>
                            <span>You dont have an account?<a href="/signup">sign up</a></span>
                        </div>

                        <div>
                            <label class="success" th:text="${successMessage}"></label>
                        </div>
                    </form>
                </div>

            </div>

        </div>
    </div>
    </section>

    
</body>
</html>
