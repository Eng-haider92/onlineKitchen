<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/external/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <title>Recipe details</title>
</head>
<body>


    <!-- *******************************************************
                    Header Section
    ******************************************************** -->
    <nav>
        <div class="logo">
            <a href="/home"><img src="img/logo/logo.png" alt=""></a>
        </div>

        <div class="list">
            <ul class="list-items">
                <li class="item"><a href="/recipes">Recipes</a></li>
                <li class="item"><a href="/addRecipe">Add recipe</a></li>
                <li class="item"><a href="#">Category</a>
                    <ul class="dropdown" >
                        <li th:each="category: ${categories}" class="dropdown-item">
                            <a th:href="${'/category' + category.id}">
                                <span th:text="${category.categoryName}"></span>
                            </a>
                        </li>
                    </ul>
                </li>
                <li class="item"><a href="#">Sort By</a>
                    <ul class="dropdown">
                        <li class="dropdown-item">
                            <a th:href="${'/SortByPrice'}"><span>Cheap</span></a>
                        </li>
                        <li class="dropdown-item">
                            <a th:href="${'/SortByDuration'}"><span>Fast</span></a>
                        </li>

                        <li class="dropdown-item">
                            <a th:href="${'/SortByPopular'}"><span>Popular</span></a>
                        </li>
                    </ul>
                </li>
                <li class="item"><a href="/favRecipe">Favorite</a></li>
                <li class="item"><a href="/myRecipes">My Recipes</a></li>
            </ul>
        </div>

        <div class="profile">
            <div class="profile-name">
                <span th:text="${username}"></span>
            </div>

            <div class="profile-option">
                <ul class="list-items">
                    <li class="item"><img th:src="@{${'images/profiles/' + profileImage}}" alt=""></a>
                        <ul class="dropdown" >
                            <li class="dropdown-item">
                                <a th:href="${'/editProfile'}"><span>Edit Profile</span></a>
                            </li>
                            <li class="dropdown-item">
                                <a th:href="${'/viewProfile'}"><span>View Profile</span></a>
                            </li>
                            <li class="dropdown-item">
                                <a th:href="${'/logout'}"><span>Logout</span></a>
                            </li>
                        </ul>
                    </li>
                </ul>

            </div>

        </div>
    </nav>

    <!-- ======================================================
                profile section
    ========================================================-->
    <section class="details">
        <div class="container">
            <div class="row">
                <div class="img-box">
                    <img th:src ="@{${'images/profiles/' + profile.profileImage}}" alt="">
                </div>
                <div class="text-box">
                    <div class="first-name">
                        <p>First Name: <span th:text="${profile.firstName}"></span></p>
                    </div>

                    <div class="last-name">
                        <p>Last Name: <span th:text="${profile.lastName}"></span></p>
                    </div>
                    
                    <div class="phone-box">
                        <p>Phone Numebr: <span th:text="${profile.phoneNumber}"></span></p>
                    </div>

                    <div class="address-box">
                        <p>Address: <span th:text="${profile.address}"></span></p>
                    </div>

                    <div class="submit-content">
                        <a href="/home">Cancel</a>
                        <button type="submit" class="btn"><a href="/editProfile">Update</a></button>
                    </div>

                </div>

            </div>
        </div>
    </section>




</body>
</html>
